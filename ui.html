<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --surface: rgba(24, 24, 27, 0.7);
      --surface-border: rgba(255, 255, 255, 0.1);
      --text: #fafafa;
      --text-muted: #a1a1aa;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --gradient-start: #6366f1;
      --gradient-end: #a855f7;
      --success: #22c55e;
      --error: #ef4444;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 13px;
      background-color: var(--bg);
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.15), transparent 25%);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 20px;
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100%;
      background: var(--surface);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      gap: 16px;
    }

    .header {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 4px;
    }

    h3 {
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(to right, #e0e7ff, #c7d2fe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }

    p.hint {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .row {
      display: flex;
      gap: 12px;
    }

    button {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    button:disabled { 
      opacity: 0.5; 
      cursor: not-allowed; 
      transform: none !important;
    }

    #btn-extract {
      background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
      color: #fff;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    #btn-extract:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
      filter: brightness(1.1);
    }

    #btn-extract:active:not(:disabled) {
      transform: translateY(1px);
    }

    #btn-copy {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      border: 1px solid var(--surface-border);
    }

    #btn-copy:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .textarea-wrapper {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--surface-border);
      background: rgba(0, 0, 0, 0.3);
      transition: border-color 0.2s ease;
    }

    .textarea-wrapper:focus-within {
      border-color: rgba(168, 85, 247, 0.5);
      box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.2);
    }

    textarea {
      flex: 1;
      background: transparent;
      color: #a7f3d0;
      border: none;
      padding: 12px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 11px;
      line-height: 1.6;
      resize: none;
      outline: none;
    }

    textarea::placeholder {
      color: rgba(161, 161, 170, 0.4);
    }

    .textarea-header {
      background: rgba(255, 255, 255, 0.03);
      padding: 6px 12px;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-muted);
      border-bottom: 1px solid var(--surface-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .dot-group {
      display: flex;
      gap: 4px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .dot-red { background: #ff5f56; }
    .dot-yellow { background: #ffbd2e; }
    .dot-green { background: #27c93f; }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      padding: 0 4px;
    }

    #status {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      min-height: 18px;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    #status.error { color: var(--error); }
    #status.success { color: var(--success); }

    .icon-spin {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    
    #resize-corner {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 16px;
      height: 16px;
      cursor: nwse-resize;
      z-index: 999;
      opacity: 0.3;
      transition: opacity 0.2s;
    }
    #resize-corner::after {
      content: '';
      position: absolute;
      bottom: 6px;
      right: 6px;
      width: 8px;
      height: 8px;
      background-image: 
        radial-gradient(circle, var(--text) 1px, transparent 1.5px);
      background-size: 3px 3px;
    }
    #resize-corner:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h3>Design Extractor</h3>
      <p class="hint">Select nodes in Figma, extract properties, and generate an LLM-ready SDUI prompt.</p>
    </div>

    <div class="row">
      <button id="btn-extract">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
        </svg>
        Extract Selected
      </button>
      <button id="btn-copy" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
        </svg>
        Copy
      </button>
    </div>

    <div class="textarea-wrapper">
      <div class="textarea-header">
        <div class="dot-group">
          <div class="dot dot-red"></div>
          <div class="dot dot-yellow"></div>
          <div class="dot dot-green"></div>
        </div>
        <span>output.json</span>
      </div>
      <textarea id="output" readonly placeholder="// Schema data will appear here..."></textarea>
    </div>

    <div class="status-bar">
      <div id="status">Ready</div>
      <div style="color: rgba(255,255,255,0.2); font-size: 10px;">RN v1.0.0</div>
    </div>
  </div>

  <div id="resize-corner" title="Drag to resize"></div>

  <script>
    let lastOutput = '';

    const btnExtract = document.getElementById('btn-extract');
    const btnCopy = document.getElementById('btn-copy');
    const output = document.getElementById('output');
    const status = document.getElementById('status');

    function setIcon(element, svgContent) {
      const text = element.childNodes[element.childNodes.length - 1];
      element.innerHTML = svgContent;
      element.appendChild(text);
    }

    const spinnerSvg = `<svg class="icon-spin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>`;
    const extractSvg = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>`;
    const checkSvg = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
    const copySvg = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;

    btnExtract.addEventListener('click', () => {
      status.innerHTML = `${spinnerSvg} <span>Extracting...</span>`;
      status.className = '';
      btnExtract.disabled = true;
      parent.postMessage({ pluginMessage: { type: 'EXTRACT' } }, '*');
    });

    btnCopy.addEventListener('click', () => {
      try {
        navigator.clipboard.writeText(lastOutput).then(() => {
          status.innerHTML = `${checkSvg} <span>Copied to clipboard!</span>`;
          status.className = 'success';
          
          btnCopy.innerHTML = `${checkSvg} Copied`;
          setTimeout(() => {
            btnCopy.innerHTML = `${copySvg} Copy`;
          }, 2000);
        }).catch(() => fallbackCopy());
      } catch (err) {
        fallbackCopy();
      }
    });

    function fallbackCopy() {
      output.select();
      document.execCommand('copy');
      window.getSelection().removeAllRanges();
      status.innerHTML = `${checkSvg} <span>Copied to clipboard!</span>`;
      status.className = 'success';
    }

    window.addEventListener('message', (event) => {
      const msg = event.data.pluginMessage;
      btnExtract.disabled = false;

      if (msg?.type === 'RESULT') {
        lastOutput = msg.json;
        output.value = lastOutput;
        btnCopy.disabled = false;
        status.innerHTML = `${checkSvg} <span>${msg.nodeCount} node(s) extracted</span>`;
        status.className = 'success';
      }

      if (msg?.type === 'ERROR') {
        status.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg> <span>${msg.message}</span>`;
        status.className = 'error';
      }
    });

    // --- Window Resize Logic ---
    const resizeCorner = document.getElementById('resize-corner');
    let isResizing = false;

    resizeCorner.addEventListener('mousedown', (e) => {
      isResizing = true;
      document.body.style.cursor = 'nwse-resize';
      document.body.style.userSelect = 'none';
      e.stopPropagation();
      e.preventDefault();
    });

    window.addEventListener('mousemove', (e) => {
      if (!isResizing) return;
      // Calculate new width and height based on mouse position.
      // Clamped to minimum reasonable window sizes for the plugin.
      const newWidth = Math.max(300, Math.floor(e.clientX + 8));
      const newHeight = Math.max(250, Math.floor(e.clientY + 8));
      parent.postMessage({ pluginMessage: { type: 'RESIZE', width: newWidth, height: newHeight } }, '*');
    });

    window.addEventListener('mouseup', () => {
      if (isResizing) {
        isResizing = false;
        document.body.style.cursor = 'default';
        document.body.style.userSelect = 'auto';
      }
    });
  </script>
</body>
</html>
